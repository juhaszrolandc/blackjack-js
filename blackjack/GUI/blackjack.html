<!DOCTYPE html>
<html lang="hu">
<head>

    <meta charset="UTF-8">
    <title>Black Jack Game</title>

    <script type="module">
        import {  } from './GUI.js';
    </script>

    <style>

        body {
            background-image: url("../images/background.jpg");
            background-repeat: repeat;
            background-size: 512px;
            margin: 0;
        }

        /* ===== MESSAGE ===== */
        #message {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin: 15px 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ===== TABLE ===== */
        #tableContainer {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 40px;
            padding: 20px;
        }

        /* ===== PLAYER / DEALER PANEL ===== */
        #leftSide, #rightSide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 350px;          /* fix magasság */
            width: 650px;
            padding: 15px 25px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        /* ===== TEXT ===== */
        #leftSide p, #rightSide p {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        /* ===== HAND ===== */
        .handContainer {
            width: 100%;
            min-height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        /* ===== CARDS ===== */
        .handContainer > img {
            width: 120px;
            height: auto;
            margin-left: -60px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
        }

        .handContainer > img:first-child {
            margin-left: 0;
        }

        /* ===== BUTTONS ===== */
        #buttonContainer {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
        }

        #buttonContainer button {
            background:  #FFD700;
            color: #000;
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* hover */
        #buttonContainer button:hover {
            background:  #ff6073;
        }

        /* active */
        #buttonContainer button:active {
            background:  #ff6073;
        }
    </style>

</head>
<body>

    <div id="tableContainer">

        <div id="leftSide">
            <div class="handContainer" id="playerHandContainer"></div>
            <p>
                <span>Player:</span>
                <span id="playerHandValue"></span>
                <span> | </span>
                <span>Chips: </span>
                <span id="chipsCount"></span>
            </p>
        </div>

        <div id="rightSide">
            <div class="handContainer" id="dealerHandContainer"></div>
            <p>
                <span>Dealer:</span>
                <span id="dealerHandValue"></span>
            </p>
        </div>

    </div>

     <p id="message"></p>

    <div id="buttonContainer">
        <button id="hitBtn">Hit</button>
        <button id="standBtn">Stand</button>
        <button id="startBtn">Start Round</button>
    </div>

</body>
</html>
