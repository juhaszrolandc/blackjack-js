<!DOCTYPE html>
<html lang="hu"><head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="blackjack.css">
    <title>Black Jack Game</title>

    <script type="module">
        import { Game } from '../game_logic/Game.js'
        import { GameController } from './GameController.js';
        import { ViewController } from './ViewController.js';

        const game = new Game();
        const view = new ViewController();
        const gameController = new GameController( game, view );

        view.init( gameController );
        view.displayState( game.chipsCount, game.playerHandValue, game.dealerHandValue );
        
        window.addEventListener("beforeunload", function (e) {
            const message = "Biztosan bezárja a játékot?";
            e.returnValue = message;
            return message;
        });

    </script>

</head><body>

    <div id="tableContainer">
        <div id="leftSide">
            <div class="handContainer" id="playerHandContainer"></div>
            <p>
                <span>Player:</span>
                <span id="playerHandValue"></span>
                <span> | </span>
                <span>Chips: </span>
                <span id="chipsCount"></span>
            </p>
        </div>

        <div id="rightSide">
            <div class="handContainer" id="dealerHandContainer"></div>
            <p>
                <span>Dealer:</span>
                <span id="dealerHandValue"></span>
            </p>
        </div>
    </div>

    <p id="message"></p>

    <div id="buttonContainer">
        <button id="hitBtn">Hit</button>
        <button id="standBtn">Stand</button>
        <button id="startBtn">Start Round</button>
    </div>

</body></html>
